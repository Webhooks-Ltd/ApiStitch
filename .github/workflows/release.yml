name: Release

on:
  push:
    tags: ['v*']

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - run: dotnet test -c Release --no-build

      - run: dotnet pack src/ApiStitch.Cli/ApiStitch.Cli.csproj -c Release --no-build -o ./artifacts /p:Version=${{ steps.version.outputs.VERSION }}

      - run: dotnet pack src/ApiStitch.OpenApi/ApiStitch.OpenApi.csproj -c Release --no-build -o ./artifacts /p:Version=${{ steps.version.outputs.VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*

      - name: Extract release notes from changelog
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["VERSION"]
          changelog = pathlib.Path("CHANGELOG.md")
          notes = pathlib.Path("release_notes.md")
          output_path = os.environ["GITHUB_OUTPUT"]

          def write_output(name: str, value: str) -> None:
              with open(output_path, "a", encoding="utf-8") as out:
                  out.write(f"{name}={value}\n")

          if not changelog.exists():
              write_output("HAS_CHANGELOG_NOTES", "false")
              sys.exit(0)

          lines = changelog.read_text(encoding="utf-8").splitlines()
          section_header = re.compile(rf"^##\s+\[?{re.escape(version)}\]?(?:\s+—.*)?\s*$")
          next_header = re.compile(r"^##\s+")

          start = None
          for i, line in enumerate(lines):
              if section_header.match(line):
                  start = i
                  break

          if start is None:
              write_output("HAS_CHANGELOG_NOTES", "false")
              sys.exit(0)

          end = len(lines)
          for i in range(start + 1, len(lines)):
              if next_header.match(lines[i]):
                  end = i
                  break

          section_lines = lines[start + 1:end]
          while section_lines and section_lines[0].strip() == "":
              section_lines.pop(0)
          while section_lines and section_lines[-1].strip() == "":
              section_lines.pop()

          content = "\n".join(section_lines).strip()
          if not content:
              write_output("HAS_CHANGELOG_NOTES", "false")
              sys.exit(0)

          notes.write_text(content + "\n", encoding="utf-8")
          write_output("HAS_CHANGELOG_NOTES", "true")
          PY

      - name: Create GitHub release from changelog
        if: steps.changelog.outputs.HAS_CHANGELOG_NOTES == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >
          gh release create "$TAG"
          ./artifacts/*.nupkg
          --repo "${{ github.repository }}"
          --title "$TAG"
          --notes-file ./release_notes.md
          ${{ steps.version.outputs.PRERELEASE == 'true' && '--prerelease' || '' }}

      - name: Create GitHub release with generated notes
        if: steps.changelog.outputs.HAS_CHANGELOG_NOTES != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >
          gh release create "$TAG"
          ./artifacts/*.nupkg
          --repo "${{ github.repository }}"
          --title "$TAG"
          --generate-notes
          ${{ steps.version.outputs.PRERELEASE == 'true' && '--prerelease' || '' }}

      - run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

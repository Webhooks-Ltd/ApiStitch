name: Release

on:
  push:
    tags: ['v*']

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore

      - run: dotnet build -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - run: dotnet test -c Release --no-build

      - run: dotnet pack src/ApiStitch.Cli/ApiStitch.Cli.csproj -c Release --no-build -o ./artifacts /p:Version=${{ steps.version.outputs.VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >
          gh release create "$TAG"
          ./artifacts/*.nupkg
          --repo "${{ github.repository }}"
          --title "$TAG"
          --generate-notes
          ${{ steps.version.outputs.PRERELEASE == 'true' && '--prerelease' || '' }}

      - run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

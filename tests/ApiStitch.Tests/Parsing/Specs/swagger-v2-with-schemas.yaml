swagger: "2.0"
info:
  title: Swagger Pet API
  version: 1.0.0
basePath: /api
paths:
  /pets:
    get:
      operationId: listPets
      produces:
        - application/json
      responses:
        200:
          description: A list of pets
          schema:
            type: array
            items:
              $ref: '#/definitions/Pet'
definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string

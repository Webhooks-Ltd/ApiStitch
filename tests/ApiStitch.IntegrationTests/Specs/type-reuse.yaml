openapi: 3.0.3
info:
  title: Type Reuse Test API
  version: 1.0.0
paths:
  /pets:
    get:
      operationId: listPets
      tags: [Pets]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      tags: [Pets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePetRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      x-apistitch-type: SampleApi.Models.Pet
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          $ref: '#/components/schemas/PetStatus'
      required: [id, name]
    PetStatus:
      type: string
      x-apistitch-type: SampleApi.Models.PetStatus
      enum: [available, pending, adopted]
    CreatePetRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]
    Category:
      type: object
      x-apistitch-type: Microsoft.AspNetCore.Mvc.ProblemDetails
      properties:
        title:
          type: string

openapi: 3.0.3
info:
  title: Inline Response Primitives API
  version: 1.0.0
paths:
  /user/login:
    get:
      operationId: loginUser
      tags: [user]
      parameters:
        - name: username
          in: query
          schema:
            type: string
        - name: password
          in: query
          schema:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: string
            application/xml:
              schema:
                type: string
        "400":
          description: Invalid username/password supplied
        default:
          description: Unexpected error

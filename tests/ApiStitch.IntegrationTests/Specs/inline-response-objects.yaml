openapi: 3.0.3
info:
  title: Inline Response Objects API
  version: 1.0.0
paths:
  /store/inventory:
    get:
      operationId: getInventory
      tags: [Store]
      responses:
        "200":
          description: Inventory map
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
  /pets/mixed:
    post:
      operationId: createPetMixed
      tags: [Pets]
      responses:
        "200":
          description: Unsupported inline composition
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Pet'
                  - type: string
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /reports/nested:
    get:
      operationId: getNestedReport
      tags: [Reports]
      responses:
        "200":
          description: Unsupported nested inline object
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    type: object
                    properties:
                      id:
                        type: string
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
          format: int64
